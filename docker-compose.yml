services:
  proxdash:
    build: .
    container_name: proxdash
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - PROXDASH_DATA=/data
      - PYTHONDONTWRITEBYTECODE=1
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    restart: unless-stopped
