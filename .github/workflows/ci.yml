name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Check scripts and Python syntax
        run: |
          bash -n build.sh deploy.sh test/run-smoke.sh
          python -m py_compile main.py test/static_checks.py test/runtime_checks.py test/http_smoke.py
      - name: Check frontend module syntax
        run: find src -maxdepth 1 -name '[0-9]*.js' -print0 | sort -z | xargs -0 -n1 node --check
      - name: Rebuild and verify generated assets
        run: |
          ./build.sh
          git diff --exit-code -- static/app.js static/version.txt
      - run: python test/static_checks.py
      - run: python test/runtime_checks.py
      - run: python test/http_smoke.py

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag proxdash-ci .
