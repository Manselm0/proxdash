<div id="page-tars" class="page">
    <header class="page-hdr">
      <div class="page-hdr-row"><h1 class="page-hdr-title">AI Assistant</h1></div>
      <p class="page-hdr-sub">A conversational assistant with read-only access to your live Proxmox cluster.</p>
      <div class="page-hdr-meta">
        <span class="page-hdr-meta-item"><span id="tars-rdy-dot" class="tars-dot"></span> <b id="tars-rdy">…</b></span>
        <span class="page-hdr-meta-sep"></span>
        <span class="page-hdr-meta-item">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>
          <b id="tars-meta-model">…</b>
        </span>
        <span class="page-hdr-meta-sep"></span>
        <span class="page-hdr-meta-item" onclick="openTarsDials()" title="Adjust personality" style="cursor:pointer">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          <b id="tars-meta-dials">…</b>
        </span>
      </div>
    </header>

    <div id="tars-chat"></div>

    <div class="tars-input-row">
      <textarea id="tars-input" rows="1" placeholder="ask the assistant…" onkeydown="tarsKey(event)"></textarea>
      <div class="tars-composer-bar">
        <button class="hd-tbtn" onclick="tarsClear()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          Clear
        </button>
        <button class="hd-tbtn" onclick="openTarsDials()" aria-label="Personality settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Personality
        </button>
        <span class="spacer"></span>
        <button id="tars-send" class="hd-tbtn" onclick="tarsSend()" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </div>

  <!-- personality modal -->
  <div id="tars-dials-modal" class="tars-modal" onclick="if(event.target===this)closeTarsDials()">
    <div class="tars-modal-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:16px;font-weight:700;color:var(--c-text)">Personality</span>
        <button onclick="closeTarsDials()" aria-label="Close" style="font-size:18px;line-height:1;color:var(--c-muted);background:none;border:none;cursor:pointer;padding:2px 6px">✕</button>
      </div>
      <div style="font-size:12px;color:var(--c-muted);margin-bottom:18px">Adjust how the assistant responds. Saved in this browser.</div>
      <div id="tars-dials" style="display:flex;flex-direction:column;gap:20px"></div>
    </div>
  </div>
</div>
