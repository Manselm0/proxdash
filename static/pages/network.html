<style>
  /* ── Network page ─────────────────────────────────────────────────────────
     A cluster-wide networking view built entirely from the live px.network
     snapshot (node /network interface lists + parsed guest net configs). Linux
     bridges are aggregated by name across nodes (like the Storage page folds
     storage rows), each shown as a card with its IP/CIDR, VLAN-aware flag, the
     uplink port(s) feeding it, and the guests attached as chips. Node NICs and
     bonds are listed per node, and — when the counters move — per-node
     throughput bars. Reuses the shared .hd-card / .bar / .sec-hdr / .sub-hdr. */
  .net-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-top:4px; }
  @media (max-width:520px){ .net-grid{ grid-template-columns:1fr; } }

  .net-card{ padding:15px 16px; display:flex; flex-direction:column; gap:10px; }
  .net-card-hdr{ display:flex; align-items:center; gap:8px; }
  .net-card-hdr>svg{ color:var(--c-muted); flex-shrink:0; }
  .net-card-name{ font-size:14px; font-weight:600; color:var(--c-text); flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .net-tag{ font-size:9px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    padding:2px 6px; border-radius:5px; flex-shrink:0; background:var(--c-hover); color:var(--c-muted); }
  .net-tag-vla{ background:rgba(var(--c-accent-rgb),.16); color:var(--c-accent); }

  .net-card-meta{ display:flex; flex-wrap:wrap; align-items:center; gap:6px 14px; font-size:12px; color:var(--c-muted); }
  .net-card-meta .net-ip{ font-weight:600; color:var(--c-text); font-variant-numeric:tabular-nums; }
  .net-card-meta code{ background:var(--c-hover); border-radius:4px; padding:1px 5px; font-size:11px; color:var(--c-text); }

  .net-uplink{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:11.5px; color:var(--c-dim); }
  .net-uplink .net-port{ background:var(--c-hover); color:var(--c-muted); border-radius:5px; padding:2px 7px; font-weight:500; }
  .net-uplink-none{ color:var(--c-dim); font-style:italic; }

  .net-guests{ display:flex; flex-wrap:wrap; gap:6px; border-top:1px solid var(--c-border); padding-top:10px; max-height:150px; overflow-y:auto; }
  .net-guests-empty{ font-size:11.5px; color:var(--c-dim); border-top:1px solid var(--c-border); padding-top:10px; }
  .net-guest{ display:inline-flex; align-items:center; gap:5px; font-size:11px; border-radius:6px; padding:3px 8px;
    background:var(--c-hover); color:var(--c-text); white-space:nowrap; max-width:100%; }
  .net-guest-name{ overflow:hidden; text-overflow:ellipsis; }
  .net-guest-down{ color:var(--c-muted); }
  .net-vtag{ font-size:9px; font-weight:700; letter-spacing:.03em; padding:1px 5px; border-radius:4px;
    background:rgba(var(--c-accent-rgb),.16); color:var(--c-accent); }

  .net-msg{ color:var(--c-muted); font-size:13px; padding:24px 2px; }
  .net-lane-sub{ margin-top:16px; }
</style>
<div id="page-network" class="page space-y-6">
  <header class="page-hdr">
    <div class="page-hdr-row">
      <h1 class="page-hdr-title">Network</h1>
    </div>
    <p class="page-hdr-sub">Per-node throughput history, traffic composition and guest wiring, sourced entirely from the Proxmox API.</p>
    <div class="page-hdr-meta" id="network-hdr-meta"></div>
  </header>
  <div id="network-root">
    <div class="net-msg">Loading network…</div>
  </div>
</div>
