<div id="page-backups" class="page space-y-6">
  <header class="page-hdr">
    <div class="page-hdr-row">

    <p class="page-hdr-sub">Proxmox Backup Server datastores and recent snapshots.</p>
    <div class="page-hdr-meta">
      <span class="page-hdr-meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
        <b id="meta-bk-datastores">–</b> datastores
      </span>
      <span class="page-hdr-meta-sep"></span>
      <span class="page-hdr-meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <b id="meta-bk-snapshots">–</b> snapshots
      </span>
      <span class="page-hdr-meta-sep"></span>
      <span class="page-hdr-meta-item">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Last: <b id="meta-bk-last">–</b>
      </span>
    </div>
  </header>

  <section id="bk-sec-datastores">
    <div class="sec-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
      <span class="sec-hdr-title">Datastores</span>
      <span class="sec-hdr-sub">Usage, freshness and trust per datastore — click a row to filter the snapshots table</span>
    </div>
    <style>.bk-ledger-row:hover{ background:var(--c-hover); }</style>
    <div id="backups-datastores"></div>
  </section>

  <section id="bk-sec-activity">
    <div class="sec-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span class="sec-hdr-title">Activity</span>
      <span class="sec-hdr-sub">Per-target backup activity — last 90 days</span>
    </div>
    <div class="hd-card p-4">
      <div id="bk-heatmap" style="overflow-x:auto;-webkit-overflow-scrolling:touch"></div>
    </div>
  </section>

  <section>
    <div class="sec-hdr">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="sec-hdr-title">Snapshots</span>
      <span class="sec-hdr-sub">All backup snapshots across datastores</span>
    </div>
    <div id="backups-table"></div>
  </section>
