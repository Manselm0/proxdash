<style>
  #page-topology.active{ display:flex; flex-direction:column; position:absolute; inset:0; overflow:hidden; }
  /* Full-bleed page: pages-root has no padding here, so the header carries its
     own. 4px top puts the description at the same y as every other page. */
  #page-topology .page-hdr{ flex-shrink:0; padding:4px 24px 8px; margin:0; }
  @media (max-width:768px){ #page-topology .page-hdr{ padding:2px 16px 6px; } }
  .topo-body{ flex:1; min-height:0; position:relative; }
  #infra-topology-root{ position:absolute; inset:0; background:var(--c-bg); overflow-y:auto; overflow-x:hidden; }
  .topo-scroll{ padding:16px 24px 32px; display:flex; flex-direction:column; gap:20px; max-width:1400px; margin:0 auto; }
  @media (max-width:768px){ .topo-scroll{ padding:12px 16px 24px; gap:16px; } }

  /* Grouped layout view: a parent card with its children in a wrapped grid */
  .g-group{ display:flex; align-items:center; gap:10px; padding:10px;
    border:1px solid var(--c-border); border-radius:12px; }
  .g-ggrid{ display:grid; gap:8px; }

  /* Tab-bar controls match the search bar's 34px height so the row reads as
     one aligned toolbar. */
  #topo-tabbar-wrap .hist-btn{ padding:7px 13px; }

  /* Below the squeeze point the tab bar's controls drop their text labels and
     run icons-only (button titles carry the names) so nothing wraps or
     collides. A CONTAINER query, not a media query: the page width also
     changes when the sidebar collapses/expands — with no viewport resize —
     and labels must come back either way. */
  #page-topology{ container-type:inline-size; }
  @container (max-width:1010px){
    #topo-tabbar-wrap .topo-btn-lbl{ display:none; }
    #topo-tabbar-wrap .hist-btn{ gap:0 !important; }
  }

  .topo-msg{ display:flex; align-items:center; justify-content:center; height:100%; color:var(--c-muted); font-size:13px; }
  .topo-msg-sm{ color:var(--c-muted); font-size:12px; padding:6px 2px; }

  /* ── Cluster summary bar ────────────────────────────────────────────────── */
  .topo-cluster{ display:flex; align-items:center; flex-wrap:wrap; gap:10px 20px;
    background:var(--c-panel); border:1px solid var(--c-border); border-radius:12px; padding:14px 18px; }
  .topo-cluster-title{ display:flex; align-items:center; gap:9px; font-size:15px; font-weight:600; color:var(--c-text); }
  .topo-cluster-title svg{ color:var(--c-accent); }
  .topo-cluster-stats{ display:flex; align-items:center; flex-wrap:wrap; gap:8px 16px; margin-left:auto; }
  .topo-cstat{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:500; color:var(--c-text); white-space:nowrap; }
  .topo-cstat-muted{ color:var(--c-muted); font-weight:400; }

  .topo-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* ── Node cards ──────────────────────────────────────────────────────────── */
  .topo-nodes{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
  @media (max-width:520px){ .topo-nodes{ grid-template-columns:1fr; } }
  .topo-node{ padding:14px 16px; display:flex; flex-direction:column; gap:12px; }
  .topo-node-dim{ opacity:.6; }
  .topo-node-hdr{ display:flex; align-items:center; gap:8px; }
  .topo-node-name{ font-size:14px; font-weight:600; color:var(--c-text); text-decoration:none;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  a.topo-node-name{ transition:color .15s var(--ease-out); }
  @media (hover:hover) and (pointer:fine){ a.topo-node-name:hover{ color:var(--c-accent); } }
  .topo-node-up{ margin-left:auto; font-size:11px; color:var(--c-dim); font-family:ui-monospace,monospace; white-space:nowrap; }
  .topo-node-up.topo-off{ color:#EF4444; text-transform:capitalize; font-family:inherit; }
  .topo-node-empty{ font-size:11.5px; color:var(--c-muted); }

  .topo-bars{ display:flex; flex-direction:column; gap:7px; }
  .topo-bar-row{ display:flex; align-items:center; gap:9px; }
  .topo-bar-lbl{ font-size:11px; color:var(--c-muted); width:30px; flex-shrink:0; }
  .topo-bar{ flex:1; height:5px; border-radius:3px; background:var(--c-bar-bg); overflow:hidden; }
  .topo-bar-fill{ height:100%; border-radius:3px; transition:width .4s var(--ease-out); }
  .topo-bar-val{ font-size:11px; font-family:ui-monospace,monospace; width:36px; text-align:right; flex-shrink:0; }

  .topo-guests{ display:flex; flex-direction:column; gap:9px; border-top:1px solid var(--c-border); padding-top:11px;
    max-height:240px; overflow-y:auto; scrollbar-width:thin; }
  .topo-gg-hdr{ font-size:10px; text-transform:uppercase; letter-spacing:.07em; font-weight:600; color:var(--c-muted); margin-bottom:6px; }
  .topo-gg-count{ color:var(--c-dim); font-weight:500; letter-spacing:0; }
  .topo-chips{ display:flex; flex-wrap:wrap; gap:5px; }
  .topo-chip{ display:inline-flex; align-items:center; gap:5px; max-width:100%;
    background:var(--c-card); border:1px solid var(--c-border); border-radius:6px; padding:3px 8px; }
  .topo-chip-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .topo-chip-name{ font-size:11.5px; color:var(--c-text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topo-chip-off .topo-chip-name{ color:var(--c-muted); }

  /* ── Storage lane ───────────────────────────────────────────────────────── */
  .topo-lane{ display:flex; flex-direction:column; gap:10px; }
  .topo-lane-hdr{ margin:6px 0 2px; }
  .topo-lane-sub{ margin-top:6px; }
  .topo-stor-lane{ display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; }
  @media (max-width:520px){ .topo-stor-lane{ grid-template-columns:1fr; } }
  .topo-stor-card{ padding:12px 14px; }
  .topo-stor-hdr{ display:flex; align-items:center; gap:7px; margin-bottom:9px; }
  .topo-stor-hdr svg{ color:var(--c-muted); flex-shrink:0; }
  .topo-stor-name{ font-size:13px; font-weight:600; color:var(--c-text); flex:1; min-width:0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .topo-tag{ font-size:9px; font-weight:700; letter-spacing:.05em; padding:2px 6px; border-radius:5px; flex-shrink:0; }
  .topo-tag-shared{ background:rgba(var(--c-accent-rgb),.16); color:var(--c-accent); }
  .topo-tag-local{ background:var(--c-hover); color:var(--c-muted); font-weight:600; letter-spacing:0; text-transform:none; }
  .topo-stor-meta{ display:flex; justify-content:space-between; font-size:11px; color:var(--c-muted); margin-top:2px; }
  .topo-stor-sub{ font-size:10px; color:var(--c-dim); margin-top:4px; }
</style>
<div id="page-topology" class="page">
  <header class="page-hdr">
    <div class="page-hdr-row">
      <h1 class="page-hdr-title">Topology</h1>
    </div>
    <p class="page-hdr-sub">The live Proxmox cluster: nodes, their guests, the storage behind them, and the network fabric connecting it all.</p>
  </header>
  <div class="topo-body">
    <div id="infra-topology-root">
      <div class="topo-msg">Loading topology…</div>
    </div>
  </div>
</div>
