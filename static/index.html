<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- iOS Safari tints its top chrome to this; black so it blends with the bar's
     black top strip below. apple-* covers the standalone/home-screen case. -->
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Proxdash</title>
<link rel="icon" href="/api/logo?theme=dark">
<link rel="apple-touch-icon" href="/api/logo?theme=dark">

<script>
// Ship every client error to the server so we can see exactly what fires on a
// real device (message, stack, page, build, browser) instead of guessing.
function _hdReport(o){
  try{
    o.page=location.pathname; o.build=(window._hdBuild||'?'); o.ua=navigator.userAgent;
    fetch('/api/clientlog',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)}).catch(function(){});
  }catch(e){}
}
window.onerror=function(msg,src,line,col,err){
  _hdReport({type:'onerror',msg:String(msg),src:String(src||''),line:line,col:col,stack:(err&&err.stack)?String(err.stack):''});
  var d=document.getElementById('hd-jserr');
  if(d){
    d.textContent='JS ERROR: '+msg+' (line '+line+')  — click to dismiss';
    d.style.display='block'; d.style.cursor='pointer';
    d.onclick=function(){d.style.display='none';};
    // Auto-clear so a one-off/stale error doesn't leave a permanently stuck
    // banner (it used to never hide → looked like the page was still broken).
    clearTimeout(window._hdJsErrT);
    window._hdJsErrT=setTimeout(function(){d.style.display='none';},10000);
  }
  return false;
};
window.addEventListener('unhandledrejection',function(ev){
  var r=ev&&ev.reason;
  _hdReport({type:'rejection',msg:String((r&&r.message)||r||''),stack:(r&&r.stack)?String(r.stack):''});
});
// Apply dark mode before render to avoid FOUC. Default: dark. Only light if explicitly opted out.
(function(){try{if(localStorage.getItem('hd-dark')!=='0')document.documentElement.classList.add('dark');}catch(e){document.documentElement.classList.add('dark');}})();
// Custom accent from a hex color (the Settings → Appearance color input).
// Overrides the :root/html.dark --c-accent tokens via an injected <style> so
// opacity formulas (rgba(var(--c-accent-rgb),…)) stay in tune. Persisted under
// the ProxDash-specific key `proxdash-accent`; when unset, NO override is
// injected and the #E57000 CSS default (Proxmox orange) stands.
function _hexToRgb(hex){
  hex = String(hex||'').replace('#','');
  if (hex.length === 3) hex = hex.split('').map(function(c){return c+c;}).join('');
  if (!/^[0-9a-fA-F]{6}$/.test(hex)) return null;
  var n = parseInt(hex, 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function applyAccentColor(hex){
  if (!hex) return;
  if (hex[0] !== '#') hex = '#' + hex;
  var rgb = _hexToRgb(hex); if (!rgb) return;
  var style = document.getElementById('hd-accent-style');
  if (!style){ style = document.createElement('style'); style.id = 'hd-accent-style'; }
  style.textContent =
    ':root{--c-accent:'+hex+'!important;--c-accent-rgb:'+rgb.join(',')+'!important;}' +
    'html.dark{--c-accent:'+hex+'!important;--c-accent-rgb:'+rgb.join(',')+'!important;}';
  document.head.appendChild(style);
  try { localStorage.setItem('proxdash-accent', hex); } catch(e){}
  if (typeof _refreshChartsForTheme === 'function'){ try { _refreshChartsForTheme(); } catch(e){} }
}
// Clear the custom accent → drop the injected override so the #E57000 CSS token
// (:root / html.dark) takes back over. Settings → Appearance "Reset" calls this.
function resetAccentColor(){
  try { localStorage.removeItem('proxdash-accent'); } catch(e){}
  var style = document.getElementById('hd-accent-style');
  if (style) style.textContent = '';
  if (typeof _refreshChartsForTheme === 'function'){ try { _refreshChartsForTheme(); } catch(e){} }
}
// Default accent for a fresh install = the Proxmox-orange CSS token (#E57000).
window.HD_DEFAULT_ACCENT = '#E57000';
// Logo: /api/logo?theme=light|dark serves the uploaded custom logo for the
// current theme (Settings → Appearance) and falls back to the bundled
// ProxDash mark (light or dark variant) server-side. A browser-local URL
// override (Settings → Logo URL) still wins over both.
function _defaultLogoUrl(){
  // Stamp the build id so each deploy mints a fresh URL — browser favicon
  // caches are sticky and ignore href-only changes on revisits.
  var v = window.__BUILD__ ? '&v=' + window.__BUILD__ : '';
  return '/api/logo?theme=' + (document.documentElement.classList.contains('dark') ? 'dark' : 'light') + v;
}
function applyLogo(url){
  var u = url || _defaultLogoUrl();
  document.querySelectorAll('img[data-logo]').forEach(function(img){ img.src = u; });
  var fav = document.querySelector('link[rel="icon"]'); if (fav) fav.href = u;
  var atl = document.querySelector('link[rel="apple-touch-icon"]'); if (atl) atl.href = u;
  try { if (url) localStorage.setItem('hd-logo', url); else localStorage.removeItem('hd-logo'); } catch(e){}
}
// Restore before first paint to avoid a flash. Only a hex stored under the
// ProxDash key applies an override; otherwise the #E57000 CSS default stands
// (no injected override), so any stale value from another app is ignored.
(function(){try{
  var col = localStorage.getItem('proxdash-accent');
  if (col && _hexToRgb(col)) applyAccentColor(col);
  var logo = localStorage.getItem('hd-logo');
  if (logo) applyLogo(logo);
  // Re-apply once the DOM exists: the sidebar <img data-logo> isn't parsed yet
  // when this head script runs, and the default is theme-dependent.
  document.addEventListener('DOMContentLoaded', function(){
    applyLogo(localStorage.getItem('hd-logo') || '');
  });
}catch(e){}})();
</script>
