<style>
/* Accent swatch row (General settings). */
.accent-swatch {
  width:26px; height:26px; border-radius:9999px;
  border:2px solid var(--c-border);
  background:transparent; cursor:pointer; padding:0;
  position:relative; transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.accent-swatch:hover { transform:scale(1.08); }
.accent-swatch.active {
  border-color:var(--c-text);
  box-shadow:0 0 0 2px var(--c-bg), 0 0 0 4px var(--c-text);
}
.accent-swatch.active::after {
  content:'';
  position:absolute; inset:4px;
  border-radius:9999px;
  background:inherit;
  pointer-events:none;
}
/* Settings page layout — top pill toggle + content card stack. */
.settings-shell {
  display: flex; flex-direction: column;
  gap: 16px;
}
.settings-pill-row {
  display: flex; align-items: center;
}
.settings-pill-row .hist-range {
  margin-left: 0;
  flex-wrap: nowrap;
  max-width: 100%;
  overflow-x: auto;
  scrollbar-width: none;
}
.settings-pill-row .hist-range::-webkit-scrollbar { display: none; }
.settings-pill-row .hist-btn {
  /* sizing (font-size/padding) is owned by #set-section-hist-range so there is
     a single source of truth; only layout lives here. */
  border-radius: 7px;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
}
.settings-pill-row .hist-btn svg { flex-shrink: 0; }
.settings-content {
  padding: 20px 24px;
  min-height: 400px;
}
.settings-save-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 16px;
  padding: 12px 16px;
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: 8px;
  position: sticky; bottom: 0;
}
@media (max-width: 768px) {
  .settings-content { padding: 16px; }
  /* Topology menu bar — compact + sensible stacking on phones:
     row 1 tabs · row 2 orientation · row 3 search (all centred). */
  #topo-tabbar-wrap { padding: 8px 12px !important; gap: 8px !important; justify-content: center !important; }
  #topo-tabbar-wrap #topo-tabs-hist-range { order: 1; }
  #topo-tabbar-wrap #topo-orient-wrap { order: 2; flex: 0 0 auto !important; justify-content: center !important; }
  #topo-tabbar-wrap #topo-view-controls { order: 3; flex: 1 1 100% !important; justify-content: center; }
  #topo-tabbar-wrap #topo-view-controls input[type="search"] { width: 100% !important; max-width: 280px; }
  /* Map menu bar — tighter gutters on phones */
  .map-menubar { padding: 6px 14px !important; }
}
/* Legacy sidebar styles kept for any external code referencing them. */
.settings-nav { display: flex; flex-direction: column; gap: 2px; }
.snav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; text-align: left;
  background: transparent; color: var(--c-muted);
  border: 1px solid transparent; border-radius: 6px;
  padding: 7px 10px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background .15s ease, color .15s ease;
  font-family: inherit;
}

/* Legacy modal tab buttons — retained in case any external code references them. */
.stab-btn {
  background: transparent;
  color: var(--c-muted);
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background-color .15s ease, color .15s ease, border-color .15s ease, transform .13s ease-out;
  font-family: inherit;
}
.stab-btn:hover { background: var(--c-hover); color: var(--c-text); }
.stab-btn.active {
  background: rgba(var(--c-accent-rgb),.1);
  color: var(--c-accent);
  border-color: rgba(var(--c-accent-rgb),.28);
}

/* Settings form */
.s-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.s-lbl { font-size:12px; color:var(--c-muted); width:110px; flex-shrink:0; text-align:right; }
.s-inp {
  flex:1; min-width:0;
  background: var(--c-card);
  border: 1px solid var(--c-border);
  border-radius: 8px;
  padding: 7px 11px;
  font-size: 12px;
  color: var(--c-text);
  font-family: inherit;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.s-inp:focus {
  outline: none;
  border-color: var(--c-accent);
  box-shadow: 0 0 0 3px rgba(var(--c-accent-rgb),.18);
}
.s-check { accent-color: var(--c-accent); width:14px; height:14px; }
.s-group { border: 1px solid var(--c-border); border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; background: var(--c-bg); }
.s-group-title { font-size:10px; font-weight:600; color:var(--c-muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; }
.s-svc-block { border:1px solid var(--c-border); border-radius:8px; padding:10px 12px; margin-bottom:8px; transition: border-color .15s ease; }
.s-svc-block:hover { border-color: var(--c-dim); }
.s-btn { background: var(--c-hover); color: var(--c-muted); border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: background-color .15s ease, color .15s ease, transform .13s ease-out; }
.s-btn:hover { background: var(--c-border); color: var(--c-text); }
.s-btn-danger { background: rgba(239,68,68,.1); color:#EF4444; border:1px solid rgba(239,68,68,.22); }
.s-btn-danger:hover { background: rgba(239,68,68,.18); }
.s-reveal { background: var(--c-border); color: var(--c-muted); border:none; border-radius:6px; padding:0 8px; cursor:pointer; font-size:13px; transition: background .15s ease; }
.s-reveal:hover { background: var(--c-dim); color: var(--c-text); }
.s-help {
  font-size:11px; line-height:1.45; color:var(--c-muted);
  background:rgba(var(--c-accent-rgb),.06); border-left:2px solid rgba(var(--c-accent-rgb),.4);
  padding:7px 10px; border-radius:0 6px 6px 0; margin:6px 0 10px;
}
.s-help a { color:var(--c-accent); text-decoration:underline; }
.s-help code { background:var(--c-hover); padding:1px 5px; border-radius:4px; font-size:11px; color:var(--c-text); }
.s-test-row { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
.s-test-btn { display:inline-flex; align-items:center; gap:6px; }
.s-test-btn:disabled { opacity:.6; cursor:wait; }
.s-test-result { font-size:11px; flex:1; min-width:0; word-break:break-word; }

/* Toast styling */
#hd-toast-inner {
  border-radius: 10px;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  border: 1px solid var(--c-border);
  backdrop-filter: blur(8px);
  animation: slide-in-right .25s ease-out both;
}

/* ── Responsive grid utilities ── */
/* Two-up when there's room, one-up when cramped — driven by AVAILABLE width
   (auto-fit), not viewport width, so it collapses correctly with the sidebar
   eating space or in a near-square window. */
.hd-row-2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:14px; margin-bottom:24px; }
.hd-row-3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(258px, 1fr)); gap:14px; margin-bottom:24px; }
/* Compact entity-card grid for VMs / LXCs. auto-FILL (not auto-fit):
   empty tracks stay reserved, so a section with 2 VMs renders them at the same
   width as a full row of LXCs instead of stretching to fill — every guest card
   is the same size regardless of count. Hosts keep .hd-row-3's auto-fit. */
.hd-row-compact { display:grid; grid-template-columns:repeat(auto-fill, minmax(232px, 1fr)); gap:14px; margin-bottom:24px; }

/* Hide the content scroller's native scrollbar. A reserved/classic scrollbar
   (macOS "Show scroll bars: Always") otherwise insets the whole scroll area,
   leaving a gutter on the right that keeps the full-bleed top bar + content from
   reaching the true edge. Content still scrolls via wheel / trackpad / keys. */
#pages-root { scrollbar-width: none; }
#pages-root::-webkit-scrollbar { display: none; }

/* ── Mobile header (hamburger bar, hidden on desktop) ── */
.mobile-hdr {
  display: flex;        /* always shown — top bar at every width (hamburger toggles the sidebar) */
  align-items: center;
  gap: 10px;
  /* 10px horizontal padding + the icon buttons' own 6px = the hamburger/toggle
     glyphs sit ~16px in, lining up with where the widgets' content begins (cards
     use p-4 = 16px), not the invisible card edge. */
  padding: 10px 10px;
  /* Keep the sticky bar's foreground OUT of the WebKit backdrop-filter layer.
     iOS re-rasterizes a filtered sticky element during rubber-band overscroll;
     when the filter lives on the header itself its text/icons briefly vanish.
     The ::before layer below owns the frost while children stay composited. */
  background: transparent;
  isolation: isolate;
  border-bottom: 1px solid transparent;
  flex-shrink: 0;
  /* Absolute overlay (desktop): full-bleed across #main-wrap (left:0/right:0) so the
     scroller's gutter can never inset it; the content scrolls UNDER it. Mobile
     re-asserts position:sticky below for native document scroll. */
  position: absolute; top: 0; left: 0; right: 0; z-index: 30;
}
.mobile-hdr::before {
  content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
  background:rgba(255,255,255,.4); border-bottom:1px solid transparent;
  -webkit-backdrop-filter:blur(25px); backdrop-filter:blur(25px);
  transform:translateZ(0); -webkit-transform:translateZ(0);
}
.mobile-hdr > * {
  position:relative; z-index:1; transform:translateZ(0); -webkit-transform:translateZ(0);
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
}
html.dark .mobile-hdr::before { background:rgba(0,0,0,.4); }
@media (min-width: 768px) {
  /* Push the scrolling content below the overlaid bar (bar height; the 4px gap to
     the description is owned by #pages-content's padding-top). Content scrolls
     UNDER the bar so the frosted blur still has something behind it. */
  #pages-root { padding-top: var(--mob-hdr-h, 52px) !important; }
  /* Full-bleed pages (absolute;inset:0) pin below the bar, against #main-wrap. */
  #page-topology.active, #page-tars.active { top: var(--mob-hdr-h, 52px) !important; }
}
.mobile-hdr-title { font-size:16px; font-weight:600; color:var(--c-text); flex:1; letter-spacing:-.01em; }
.hamburger {
  background: none; border: none; cursor: pointer;
  color: var(--c-muted); padding: 6px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.hamburger:hover { background: var(--c-hover); color: var(--c-text); }

/* ── Mobile overrides ── */
@media (max-width:767px) {
  /* Mobile = native document scroll (so the page rubber-band-bounces and the
     Safari URL bar collapses), with the header as a position:sticky element so
     it bounces WITH the page instead of floating fixed above it. */
  html, body { overscroll-behavior-y: auto; }
  body { display: block !important; height: auto !important; min-height: 100dvh; overflow-x: hidden; overflow-y: visible !important; }
  #main-wrap { margin-left: 0 !important; display: block !important; }
  #pages-root { overflow: visible !important; height: auto !important; overscroll-behavior-y: auto !important; }
  .mobile-hdr { display: flex; padding-top: max(10px, env(safe-area-inset-top)); position: sticky; top: 0; z-index: 30; }
  #sidebar-expand-btn { display: none !important; }
  #sidebar { width: min(280px, 85vw) !important; padding-left: env(safe-area-inset-left); }
  /* Content flows right after the sticky bar — minimal top gap so text starts
     directly below the bar; normal gutters on the sides + safe-area bottom. */
  #pages-content { padding: 4px 0 !important; padding-bottom: max(14px, env(safe-area-inset-bottom)) !important; }

  /* Full-bleed pages (map/topology) are authored as position:absolute;inset:0
     against a fixed-height scroller. Under mobile document-scroll the scroller has
     no height, so they collapse — pin them to the viewport below the sticky bar
     instead. --mob-hdr-h is measured + set by _mobileHdrSync(). */
  #page-topology.active {
    position: fixed !important;
    inset: var(--mob-hdr-h, 52px) 0 0 0 !important;
    height: auto !important;
  }

  /* Built-in grid utilities */
  .hd-row-2 { grid-template-columns: 1fr; gap: 12px; margin-bottom: 18px; }
  .syn-nas-row, .syn-bot-row { grid-template-columns: 1fr !important; }
  .hd-row-3 { grid-template-columns: 1fr; gap: 12px; margin-bottom: 18px; }
  .hd-row-compact { grid-template-columns: 1fr; gap: 12px; margin-bottom: 18px; }
  /* Health checks are compact status tiles, not full-width banners — keep them
     2-up on phones so a dozen checks don't turn into a giant scrolling stack.
     The tick strip + latency sparkline scale down fine at half width. */
  #page-health .hd-row-3 { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  #page-health #health-vitals, #page-health #health-subsys { grid-template-columns: 1fr; }
  /* min-width:0 lets the card shrink below its tick-strip's min-content so the
     2-up tracks hold their width instead of overflowing the viewport; the strip
     already clips (overflow-hidden, right-aligned) to the most recent history. */
  #page-health .hd-row-3 .hd-card { padding: 12px; min-width: 0; }
  #page-health .hd-row-3 .hd-card > .flex.gap-px { min-width: 0; }
  /* Section headers: wrap is now unconditional (base .sec-hdr rule above) —
     just the mobile size/spacing tweaks left here. */
  .sec-hdr { margin-bottom: 12px; }
  .sec-hdr-title { font-size: 14px; }
  .sec-hdr-sub   { font-size: 11px; }
  .hist-range { flex-wrap: wrap; max-width: 100%; margin-left: auto; }
  /* .sec-hdr wrapping (above) only drops .sec-hdr-actions to its own row —
     it doesn't help once that row itself holds multiple unshrinkable groups
     (e.g. Compute's Cluster header: a scope pill + filter box + time-range
     pill in one row). Without this, .sec-hdr-actions never wraps internally
     and just overflows the viewport. Same fix .stor-card-hdr already has. */
  /* width:100% matters here, not just flex-wrap: .sec-hdr-actions has no
     flex-grow by default, so it shrinks to fit its content — meaning any
     child's `max-width:100%`/`flex:1 1 100%` has no definite width to
     resolve against (a circular sizing case) and silently does nothing,
     which is exactly how the scope pill below escaped its max-width and
     overflowed the page instead of scrolling within itself. */
  .sec-hdr-actions { flex-wrap: wrap; row-gap: 6px; width: 100%; }
  /* Compute's Cluster header specifically: letting its 3 groups (scope pill,
     filter box, time-range pill) share-and-wrap a row (the generic rule
     above) still looks broken once real node names are long enough that the
     scope pill itself wraps mid-pill (an orphaned last button on its own
     line inside the rounded background) and shoves the time-range pill off
     to one side. Stack each group on its own row instead of sharing one —
     but via flex-direction:column, NOT `flex-basis:100%` on each child
     (tried that first): a pill's rounded background lives directly on the
     flex item, so forcing its basis to 100% stretched the pill itself full
     width with the buttons still packed at one end, looking just as broken
     as the overflow it replaced. Column direction stacks them without
     touching each pill's own size; align-items:flex-start stops the default
     cross-axis stretch (which in column mode would do the same thing). */
  #page-proxmox .sec-hdr-actions { flex-direction: column; align-items: flex-start; }
  /* The scope pill's button count is unbounded (one per cluster node, any
     Proxmox install) — internal flex-wrap (the generic .hist-range mobile
     rule) degrades badly past a handful of nodes. Make it a single-line,
     horizontally-scrollable strip instead, like an iOS segmented/chip row;
     ID specificity wins over the generic .hist-range class rule. */
  #px-scope-hist-range { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  #px-scope-hist-range::-webkit-scrollbar { display: none; }
  /* Settings rows: a fixed 110px right-aligned label beside the input is too
     cramped on a phone once the field also carries a reveal-toggle button
     (API key / token secret rows) — stack label above field instead, the
     standard mobile form pattern, rather than chase the exact pixel margin. */
  .s-row { flex-wrap: wrap; }
  .s-lbl { width: 100%; text-align: left; margin-bottom: 3px; }

  /* Storage / Ceph card header: name + (Predictions + range pills) +
     status badge all in one inline-flex row → overflows on phones once the
     6-button range strip is in play. Allow wrap, then force the toolbar to
     its own full-width row beneath the title. */
  .stor-card-hdr { flex-wrap: wrap; }
  .stor-card-hdr .stor-toolbar {
    order: 99;
    flex: 1 1 100%;
    margin-left: 0 !important;
    margin-top: 4px;
    justify-content: flex-start;
  }
  /* Per-chart sub-header (label + confidence pill + Historical/Prediction
     legend). Same fix: wrap, drop legend onto its own row. */
  .stor-hdr { flex-wrap: wrap; gap: 6px 8px; }
  .stor-hdr .stor-hdr-spacer { display: none; }
  .stor-hdr .stor-legend {
    flex: 1 1 100%;
    margin-top: 2px;
    justify-content: flex-start;
  }

  /* Chart canvases capture touch by default, so a finger landing on (e.g.)
     the Draw Over Time chart blocks the page from scrolling. Tell the
     browser to handle vertical pan natively — taps still reach Chart.js
     for tooltips, but a vertical drag scrolls the page. */
  canvas { touch-action: pan-y; }

  /* Page headers shrink + meta wraps. Hide the in-page H1 — the mobile
     header bar already shows the page title, so showing it again here
     reads as duplicated ("Overview / Overview"). */
  .page-hdr { padding-top: 0; padding-bottom: 12px; }
  .page-hdr-row   { display: none; }
  .page-hdr-sub   { font-size: 12px; }
  .page-hdr-meta  { gap: 10px; font-size: 11px; margin-top: 6px; }
  /* Trim verbose text on mobile: drop the overview blurb + meta parentheticals. */
  #page-overview .page-hdr-sub { display: none; }
  .ov-meta-sub { display: none; }
  .sub-hdr-title  { font-size: 12px; }
  /* If a page-hdr has neither sub nor meta after hiding the row, collapse it */
  .page-hdr:not(:has(.page-hdr-sub)):not(:has(.page-hdr-meta)) {
    display: none;
  }

  /* Overview Network card: keep title + WAN/clients + Down/Up legend on ONE line.
     The grid (minmax 480px) keeps the widget full-width here, so there's room —
     no reordering or forced second row. */
  .ov-net-meta span { white-space: nowrap; }

  /* KPI tiles tighter */
  .kpi-card { padding: 10px; gap: 10px; }
  .kpi-icon { width: 32px; height: 32px; }
  .kpi-val { font-size: 16px; }
  .kpi-lbl { font-size: 11px; }

  /* Card padding slimmer (Tailwind p-4 = 16px → 12px) */
  .hd-card.p-4 { padding: 12px !important; }

  /* Stack hardcoded inline 2-col grids */
  [style*="grid-template-columns:1fr 1fr"],
  [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }

  /* Overview 2fr 1fr 1fr row → stack with auto row height */
  [style*="grid-template-columns:2fr 1fr 1fr"] {
    grid-template-columns: 1fr !important;
    grid-template-rows: auto !important;
  }

  /* Cluster history 3-col layout → stack */
  [style*="grid-template-columns:280px 1fr 280px"] { grid-template-columns: 1fr !important; }

  /* Storage topology: keep 3-col horizontal layout on mobile, just narrower */
  #stor-scroll [style*="grid-template-columns:280px 1fr 280px"] {
    grid-template-columns: 170px 1fr 170px !important;
  }
  #stor-scroll .stor-pc, #stor-scroll .stor-cc {
    padding: 8px 9px !important;
  }
  #stor-scroll .stor-pc span, #stor-scroll .stor-cc span { font-size: 11px !important; }

  /* Auto-fill minmax grids — collapse wide minimums */
  [style*="minmax(360px"],
  [style*="minmax(300px"],
  [style*="minmax(280px"],
  [style*="minmax(260px"],
  [style*="minmax(240px"],
  [style*="minmax(220px"] { grid-template-columns: 1fr !important; }
  [style*="minmax(200px"],
  [style*="minmax(180px"],
  [style*="minmax(160px"],
  [style*="minmax(140px"] { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)) !important; }
  [style*="minmax(90px"] { grid-template-columns: repeat(auto-fill, minmax(80px,1fr)) !important; }

  /* (Drawer width override moved out of this 768px block — see the phone-only
     @media(max-width:560px) rule near the drawer styles. At 560–767px the sidebar
     collapses but the drawer keeps its desktop 500px/2-3 width, which fits better
     than 80vw at those near-desktop widths.) */

  /* Health/HC settings rows: stack so the URL field isn't crushed.
     Row 1 = Name + URL, row 2 = remove + Test, mirroring .syn-nas-row. */
  .hc-row {
    grid-template-columns: 110px 1fr !important;
    gap: 6px !important;
    align-items: center !important;
  }
  /* Hide the header pseudo-row's empty action columns on mobile (the values
     stack inside each .hc-row instead). */
  [style*="grid-template-columns:120px 1fr 28px"] {
    grid-template-columns: 110px 1fr !important;
    gap: 6px !important;
  }

  /* Tame any oversized canvases */
  canvas { max-width: 100% !important; }

  /* Topology pages — narrower cards on mobile; tier columns already horizontal by default */
  #net-canvas, #comp-canvas { gap: 32px !important; }
  #net-canvas > div, #comp-canvas > div { gap: 32px !important; }
  .net-card, .comp-card { width: 170px !important; }
  #net-scroll, #comp-scroll { padding: 18px 14px !important; }

  /* Backups snapshots table: hide low-priority Verify/Owner columns and let the
     search field span the row so the fixed-layout table isn't crushed at 390px. */
  #page-backups #bk-search { width: 100% !important; flex: 1 1 auto !important; }
  #page-backups #bk-thead th:nth-child(5), #page-backups #bk-thead th:nth-child(6),
  #page-backups #bk-rows td:nth-child(5), #page-backups #bk-rows td:nth-child(6) { display: none !important; }
}

/* ── History range pill slider ── */
.hist-range {
  display:inline-flex; align-items:center;
  padding:3px; border-radius:10px;
  background:var(--c-hover); position:relative;
  margin-left:auto; gap:0; flex-shrink:0;
}
.hist-thumb {
  position:absolute; top:3px; height:calc(100% - 6px);
  border-radius:7px; background:var(--c-card);
  box-shadow:0 1px 4px rgba(0,0,0,.14),0 0 0 .5px rgba(255,255,255,.06);
  transition:left .22s var(--ease-drawer),width .22s var(--ease-drawer);
  pointer-events:none;
}
.hist-btn {
  position:relative; z-index:1;
  font-size:11px; font-weight:500;
  padding:4px 10px; border-radius:7px;
  background:transparent; color:var(--c-muted);
  border:none; cursor:pointer; font-family:inherit;
  transition:color .15s ease, transform .13s ease-out;
  white-space:nowrap; line-height:1.4;
  display:inline-flex; align-items:center; gap:4px;
}
.hist-btn.active { color:var(--c-text); font-weight:600; }
.hist-btn:not(.active):hover { color:var(--c-text); }
/* Per-chart "Range" band toggle — a single on/off chip styled to read like a
   pill segment (matches .hist-btn sizing; fills like a thumb when active)
   instead of the old shrunken bare button. */
.chart-range-toggle {
  font-size:11px; font-weight:500; line-height:1.4;
  padding:4px 10px; border-radius:7px;
  background:var(--c-hover); color:var(--c-muted);
  border:none; cursor:pointer; font-family:inherit;
  display:inline-flex; align-items:center; gap:4px;
  transition:color .15s ease, background .15s ease;
}
.chart-range-toggle:hover { color:var(--c-text); }
.chart-range-toggle.active {
  background:var(--c-card); color:var(--c-text); font-weight:600;
  box-shadow:0 1px 4px rgba(0,0,0,.14),0 0 0 .5px rgba(255,255,255,.06);
}
/* Settings section tabs reuse .hist-range but carry icons; trim their icon size
   + padding so the bar sits closer to the standard 29px pill height. */
#set-section-hist-range .hist-btn { padding:5px 11px; font-size:12px; }
#set-section-hist-range .hist-btn svg { width:14px; height:14px; }
/* Tool widgets (speed/storage/reachability/WoL) — shared by the Tools page and
   the Network page's Internet Speed card. The run button matches the pill
   selectors (borderless --c-hover, radius 10); running shows an orbiting satellite
   driven by _runBtnStart/_runBtnStop. */
/* Tool-card header — top-level card title (keeps the accent icon, normalized to
   the type scale: 14px accent icon, 13px/600 label, gap 7px). */
.tool-card-hdr{ display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.tool-card-hdr .tch-ic{ color:var(--c-muted); display:inline-flex; flex-shrink:0; }
.tool-card-hdr .tch-t{ font-size:13px; font-weight:600; color:var(--c-text); }
.tool-field{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--c-muted); }
.tool-field > span{ flex-shrink:0; width:64px; }
.tool-select{ flex:1; min-width:0; height:30px; border-radius:7px; border:1px solid var(--c-border);
  background:var(--c-bg); color:var(--c-text); font-family:inherit; font-size:12px; padding:0 8px; outline:none; box-sizing:border-box;
  transition:border-color .15s ease, box-shadow .15s ease; }
.tool-select:focus{ border-color:var(--c-accent); box-shadow:0 0 0 3px rgba(var(--c-accent-rgb),.15); }
/* Matches the .hd-tbtn toolbar buttons (e.g. the TARS page): bordered, card bg,
   8px radius, hover lightens the background. Kept full-width (pinned to the
   bottom of each tool card) + the .busy running-orb state below. */
.tool-run{ display:flex; align-items:center; justify-content:center; gap:9px;
  width:100%; height:34px; border:1px solid var(--c-border); border-radius:8px;
  background:var(--c-card); color:var(--c-text);
  font-size:13px; font-family:inherit; cursor:pointer;
  transition:background-color .12s ease, border-color .12s ease, color .15s ease, transform .13s var(--ease-out); }
.tool-run:active:not(.busy){ transform:scale(.97); }   /* press feedback — the UI heard you */
.tool-run.busy{ cursor:wait; color:var(--c-accent); }
.tool-run.just-ran{ color:var(--c-text)!important; }   /* after a run: stay neutral until the cursor leaves */
/* Hover effects gated to real pointers so a touch tap doesn't stick in :hover. */
@media (hover:hover) and (pointer:fine){
  .tool-select:hover{ border-color:var(--c-accent); }
  .tool-run:hover:not(.busy){ background:var(--c-hover); }
}
/* Tool cards = equal-height flex columns so the run button stays pinned to the
   bottom (it used to drift up when a chart/result grew a sibling card in the row). */
#page-tools .hd-row-3 > .hd-card{ display:flex; flex-direction:column; }
#page-tools .tool-run{ margin-top:auto; }
/* Result content arrives with a gentle rise instead of snapping in. */
#page-tools [id^="tool-"][id$="-result"] > *{ animation:fade-in .28s var(--ease-out) both; }
.tool-run .tr-run{ display:none; align-items:center; gap:9px; }
.tool-run.busy .tr-run{ display:inline-flex; }
.tool-run.busy .tr-idle{ display:none; }
.orb-scene{ position:relative; width:20px; height:20px; flex-shrink:0; }
.orb-scene .planet{ position:absolute; left:10px; top:10px; width:7px; height:7px; margin:-3.5px 0 0 -3.5px; border-radius:50%;
  background:radial-gradient(circle at 34% 30%, #d6f7ff, var(--c-accent)); box-shadow:0 0 6px rgba(var(--c-accent-rgb),.5); opacity:.85; }
.orb-scene .spin{ position:absolute; left:10px; top:10px; width:0; height:0; }
.orb-scene .sat{ position:absolute; left:-2.5px; top:-11px; width:5px; height:5px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #fff, var(--c-accent) 75%); box-shadow:0 0 6px 1px rgba(var(--c-accent-rgb),.85); }
/* Custom date popover */
.hist-pop {
  display:none; flex-direction:column; gap:10px;
  position:absolute; top:calc(100% + 8px); right:0; z-index:300;
  min-width:230px; background:var(--c-card);
  border:1px solid var(--c-border); border-radius:12px; padding:14px;
  box-shadow:0 8px 32px rgba(0,0,0,.22),0 2px 8px rgba(0,0,0,.1);
}
.hist-pop.show { display:flex; }
.hist-pop-label {
  display:block; font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.04em;
  color:var(--c-muted); margin-bottom:4px;
}
.hist-date {
  font-size:12px; background:var(--c-bg); color:var(--c-text);
  border:1px solid var(--c-border); border-radius:7px;
  padding:6px 9px; font-family:inherit; cursor:pointer;
  width:100%; box-sizing:border-box; outline:none;
  transition:border-color .15s;
}
.hist-date:focus { border-color:var(--c-accent); }
html.dark .hist-date::-webkit-calendar-picker-indicator { filter:invert(60%); }
.hist-pop-apply { background:var(--c-accent); color:#fff; }
html.dark .hist-pop-apply { color:#000; }
.hd-legend { display:flex; gap:12px; flex-wrap:wrap; padding:0 0 6px; justify-content:flex-end; }
/* Inline variant: legend sits in a .sub-hdr row beside the title (no bottom pad). */
.hd-legend-inline { padding:0; gap:10px; }
.hd-legend-item { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--c-muted); white-space:nowrap; }
.hd-legend-line { width:14px; height:2px; border-radius:1px; flex-shrink:0; }
/* Legacy dot kept for backwards-compat with any inline markup that still uses it. */
.hd-legend-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* Shared sizing for storage volume + physical drive / Ceph OSD cells so they
   line up identically on the Storage page regardless of content. */
.stor-cell { min-height: 92px; }

/* Storage trend chart — Tracearr-style inline legend in header */
.stor-hdr { display:flex; align-items:center; gap:6px; margin-bottom:8px; min-width:0; }
.stor-hdr-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--c-muted); flex-shrink:0; }
.stor-hdr-spacer { flex:1; min-width:8px; }
.stor-legend { display:flex; align-items:center; gap:12px; font-size:10px; color:var(--c-muted); flex-wrap:nowrap; }
.stor-leg { display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.stor-leg-line { width:14px; height:2px; background:var(--c-accent); border-radius:1px; flex-shrink:0; }
.stor-leg-line.dashed { background:transparent; border-top:2px dashed var(--c-accent); height:0; }
.stor-leg-dia { width:6px; height:6px; background:var(--c-accent); transform:rotate(45deg); display:inline-block; flex-shrink:0; margin:0 -2px; }
.stor-conf-pill {
  display:none; align-items:center; gap:4px; font-size:9px; font-weight:600;
  text-transform:uppercase; letter-spacing:.04em; padding:2px 7px; border-radius:999px;
  flex-shrink:0; line-height:1.3; border:1px solid transparent;
}
.stor-conf-pill.show { display:inline-flex; }
.stor-conf-pill::before { content:''; width:5px; height:5px; border-radius:50%; background:currentColor; box-shadow:0 0 6px currentColor; }
/* Confidence variants — match Tracearr's Badge success/warning/secondary. */
.stor-conf-pill.conf-high   { background:rgba(34,197,94,.12);  color:#16A34A; border-color:rgba(34,197,94,.3); }
.stor-conf-pill.conf-medium { background:rgba(245,158,11,.12); color:#D97706; border-color:rgba(245,158,11,.3); }
.stor-conf-pill.conf-low    { background:rgba(113,113,122,.14); color:#71717A; border-color:rgba(113,113,122,.3); }
html.dark .stor-conf-pill.conf-high   { background:rgba(34,197,94,.18); color:#4ADE80; border-color:rgba(74,222,128,.3); }
html.dark .stor-conf-pill.conf-medium { background:rgba(245,158,11,.18); color:#FBBF24; border-color:rgba(251,191,36,.3); }
html.dark .stor-conf-pill.conf-low    { background:rgba(161,161,170,.16); color:#A1A1AA; border-color:rgba(161,161,170,.3); }


/* Storage chart custom tooltip */
.stor-tooltip {
  /* fixed (not absolute): an absolute tooltip parked deep down a tall page held
     the document's scrollHeight open after navigating to a shorter page (you
     could scroll into empty space until refresh). Fixed elements never extend
     the scroll area. Positioned in viewport coords by _placeTooltip. */
  position:fixed; pointer-events:none; z-index:9999;
  background:var(--c-card); border:1px solid var(--c-border); border-radius:8px;
  padding:9px 11px;
  box-shadow:0 8px 24px rgba(0,0,0,.25), 0 2px 6px rgba(0,0,0,.08);
  font-size:11px; color:var(--c-text);
  opacity:0;
  /* opacity fades quickly; left/top trail with a heavy ease so the tooltip
     reads like it has mass — slight follow-lag instead of snap-to-cursor */
  transition:
    opacity .12s ease,
    left  .18s var(--ease-out),
    top   .18s var(--ease-out);
  /* Positioned beside the cursor by _stdTooltipHandler (top-left anchor, no
     centering transform) so it can sit left/right of the caret and stay in-bounds. */
  min-width:130px;
}
html.dark .stor-tooltip { box-shadow:0 8px 28px rgba(0,0,0,.55), 0 2px 6px rgba(0,0,0,.3); }
.stor-tt-title { font-weight:700; font-size:11px; color:var(--c-text); margin-bottom:5px; letter-spacing:.01em; }
.stor-tt-line { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--c-muted); line-height:1.55; }
.stor-tt-bullet { color:var(--c-accent); font-size:11px; line-height:1; flex-shrink:0; }

@keyframes topoSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Shared interactive tiered graph (Topology + Network map) ─────────────── */
.g-scroll { flex:1; width:100%; min-height:0; min-width:0; overflow:hidden; padding:24px 16px; position:relative; box-sizing:border-box; }
.g-canvas { position:relative; display:flex; align-items:center; gap:60px; min-width:max-content; transform-origin:0 0; }
.g-svg { position:absolute; inset:0; overflow:visible; pointer-events:none; width:100%; height:100%; z-index:0; }
.g-tiers { position:relative; z-index:1; display:flex; align-items:center; gap:60px; }
.g-tier { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.g-tier-lbl { font-size:10px; color:var(--c-muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600; text-align:center; margin-bottom:10px; white-space:nowrap; }
.g-tier-cnt { color:var(--c-dim); font-weight:500; letter-spacing:0; }
.g-tier-cards { display:flex; gap:10px; align-items:stretch; }
.g-card { position:relative; flex-shrink:0; width:200px; box-sizing:border-box; padding:8px 10px 8px 13px; overflow:hidden;
  background:var(--c-card); border:1px solid var(--c-border); border-radius:8px;
  transition:border-color .15s ease, box-shadow .15s ease, opacity .15s ease; }
.g-card-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:8px 0 0 8px; }
.g-card-top { display:flex; align-items:center; gap:5px; }
.g-card-ico { display:inline-flex; flex-shrink:0; }
.g-card-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.g-card-name { font-weight:600; font-size:13px; color:var(--c-text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.g-badge { font-size:9px; font-weight:700; letter-spacing:.03em; padding:1px 5px; border-radius:4px; flex-shrink:0; }
.g-card-sub { font-size:10px; color:var(--c-muted); padding-left:19px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:ui-monospace,monospace; margin-top:2px; }
.g-card-stat { font-size:11px; color:var(--c-muted); padding-left:19px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
.g-edge { transition:opacity .15s ease, stroke-width .15s ease; }
.g-empty { display:flex; align-items:center; justify-content:center; height:100%; min-height:160px; color:var(--c-muted); font-size:13px; text-align:center; padding:40px; }

/* Node detail drawer (Topology) */
.topo-drawer-ov { position:fixed; inset:0; z-index:120; pointer-events:auto; }
.topo-drawer { position:absolute; top:0; right:0; bottom:0; width:360px; max-width:90vw; background:var(--c-card);
  border-left:1px solid var(--c-border); overflow-y:auto; animation:topoSlideIn .22s var(--ease-out); }
.topo-dr-hdr { display:flex; align-items:center; gap:8px; padding:14px 16px 12px; border-bottom:1px solid var(--c-border); }
.topo-dr-ico { display:inline-flex; flex-shrink:0; }
.topo-dr-title { flex:1; min-width:0; }
.topo-dr-name { font-weight:600; color:var(--c-text); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.topo-dr-sub { font-size:10px; color:var(--c-muted); }
.topo-dr-status { display:flex; align-items:center; gap:4px; font-size:10px; color:var(--c-muted); text-transform:capitalize; flex-shrink:0; }
.topo-dr-close { background:none; border:none; cursor:pointer; color:var(--c-muted); font-size:18px; line-height:1; padding:0; flex-shrink:0; }
.topo-dr-body { padding:14px 16px; }
.topo-dr-tbl { width:100%; border-collapse:collapse; }
.topo-dr-k { padding:6px 12px 6px 0; color:var(--c-muted); font-size:11px; border-bottom:1px solid var(--c-border); white-space:nowrap; }
.topo-dr-v { padding:6px 0; color:var(--c-text); font-family:ui-monospace,monospace; font-size:11px; border-bottom:1px solid var(--c-border); }
.topo-dr-empty { font-size:12px; color:var(--c-muted); }
.topo-dr-link { display:block; margin-top:16px; padding:7px 12px; border:1px solid; border-radius:6px; font-size:12px; text-decoration:none; text-align:center; }
@media (max-width:767px) { .g-card { width:168px; } }
</style>

<script src="/static/app.js"></script>

</body>
</html>
