<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ProxDash">
  <!-- Original ProxDash mark: a stack/cluster of servers in Proxmox orange.
       Deliberately NOT the Proxmox trademarked logo. -->
  <rect width="32" height="32" rx="7" fill="#E57000"/>
  <g fill="#ffffff">
    <rect x="7" y="7"    width="18" height="5" rx="1.6" opacity="0.96"/>
    <rect x="7" y="13.5" width="18" height="5" rx="1.6" opacity="0.80"/>
    <rect x="7" y="20"   width="18" height="5" rx="1.6" opacity="0.62"/>
  </g>
  <g fill="#E57000">
    <circle cx="10" cy="9.5"  r="1.05"/>
    <circle cx="10" cy="16"   r="1.05"/>
    <circle cx="10" cy="22.5" r="1.05"/>
  </g>
</svg>
